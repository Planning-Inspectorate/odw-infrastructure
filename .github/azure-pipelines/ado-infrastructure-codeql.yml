trigger:
  branches:
    include:
      - main
      - feat

pr:
  branches:
    include:
      - main
      - feat

schedules:
- cron: "21 19 * * 0"
  displayName: Weekly CodeQL Scan
  branches:
    include:
      - main
  always: true

pool: pins-agent-pool-odw-build-uks

variables:
  language: 'python'

# timeout: 360

jobs:
  - job: Analyze
    displayName: 'CodeQL Analysis'
    steps:
      # Checkout repository
      - checkout: self
        fetchDepth: 0
        displayName: 'Checkout repository'

      # Install CodeQL CLI
      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.x'
        displayName: 'Setup Python'

      - script: |
          mkdir -p $HOME/codeql-home
          cd $HOME/codeql-home
          wget https://github.com/github/codeql-cli-binaries/releases/latest/download/codeql-linux64.zip
          unzip codeql-linux64.zip
          echo "##vso[task.prependpath]$HOME/codeql-home/codeql"
        displayName: 'Install CodeQL CLI'

      # Download CodeQL Python query pack
      - script: |
          codeql pack download codeql/python-queries
        displayName: 'Download CodeQL Python Query Pack'

      # Create CodeQL database
      - script: |
          codeql database create $(Build.SourcesDirectory)/codeql-db \
            --language=$(language) \
            --source-root=$(Build.SourcesDirectory) \
            --verbose
        displayName: 'Initialize CodeQL Database'

      # Run CodeQL analysis
      - script: |
          codeql database analyze $(Build.SourcesDirectory)/codeql-db \
            --format=sarif-latest \
            --output=$(Build.ArtifactStagingDirectory)/results.sarif \
            --verbose
        displayName: 'Perform CodeQL Analysis'

            # Publish SARIF results to Azure DevOps Security Tab
      - task: PublishSecurityAnalysisLogs@3
        inputs:
          ArtifactName: 'CodeQL-Results'
          ArtifactType: 'Sarif'
          PublishProcessedResults: true
          AllTools: false
          ToolLogsNotFoundAction: 'Standard'
        displayName: 'Publish CodeQL Results'
        continueOnError: true

      # Upload SARIF as build artifact
      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)'
          ArtifactName: 'CodeQL-SARIF'
          publishLocation: 'Container'
        displayName: 'Publish SARIF Artifact'
        condition: always()

